name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Type Check + Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check agents/ config/ orchestrator.py tests/

      - name: Type check (mypy)
        run: mypy agents/ config/ orchestrator.py --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=agents --cov=config --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  pipeline-smoke:
    name: End-to-End Smoke Test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline on sample data
        run: |
          python orchestrator.py \
            --data-dir data/sample \
            --output-dir /tmp/reports \
            --verbose

      - name: Verify outputs exist
        run: |
          test -f /tmp/reports/IndiBrew_GCC_Weekly_Risk_Brief.md
          test -f /tmp/reports/IndiBrew_GCC_30Day_Trend_Brief.md
          test -f /tmp/reports/IndiBrew_GCC_Dashboard.html
          echo "✅ All output files generated successfully"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: risk-monitor-outputs
          path: /tmp/reports/
          retention-days: 7
